<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Movie</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000000;
      font-family: Arial, sans-serif;
    }
    .export-page {
      position: relative;
      width: 1440px;
      min-width: 1440px;
      min-height: 1600px;
      margin: 0 auto;
      background: #000000;
      overflow: hidden;
    }

    /* Full-screen white overlay, hidden by default */
    #white-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 9999;
    }

    #white-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>

  <!-- White overlay covers absolutely everything -->
  <div id="white-overlay"></div>

  <div class="export-page">
    <h2 style="position:absolute;left:290.217px;top:1392.22px;font-size:15px;color:#f9f9f9;font-family:Arial;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">Black </h2>
    <h2 id="timer" style="position:absolute;left:665.7px;top:1278px;font-size:20px;color:#ffffff;font-family:Arial;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">01:04:33</h2>
    <p style="position:absolute;left:649.233px;top:1528.53px;font-size:10px;color:#374151;font-family:Arial;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">© 2026 Thomas Vettikad</p>
    <h2 style="position:absolute;left:349.233px;top:1360.53px;font-size:34px;color:#ffffff;font-family:helv;font-weight:700;font-style:italic;text-decoration:underline;margin:0;white-space:pre-wrap">movie</h2>
    <h2 style="position:absolute;left:586.467px;top:1376.77px;font-size:15px;color:#ffffff;font-family:Arial;font-weight:700;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">(</h2>
    <h2 style="position:absolute;left:603.35px;top:1378.65px;font-size:18px;color:#bbbbbb;font-family:Arial;font-weight:700;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">2026</h2>
    <h2 style="position:absolute;left:728.35px;top:1384.65px;font-size:15px;color:#ffffff;font-family:Arial;font-weight:700;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">,</h2>
    <h2 style="position:absolute;left:874.4px;top:1369.7px;font-size:30px;color:#ffffff;font-family:courier;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">Thomas</h2>
    <h2 style="position:absolute;left:1209.47px;top:1372.77px;font-size:15px;color:#ffffff;font-family:Arial;font-weight:700;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">)</h2>
    <h2 style="position:absolute;left:773.467px;top:1373.77px;font-size:12px;color:#b0b0b0;font-family:TIMES;font-weight:700;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">DIRECTED BY</h2>
    <h2 style="position:absolute;left:1070.05px;top:1369.35px;font-size:28px;color:#ffffff;font-family:courier;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">Vettikad</h2>
    <h2 style="position:absolute;left:1004.58px;top:1374.88px;font-size:10px;color:#d3d3d3;font-family:COURIER;font-weight:400;font-style:normal;text-decoration:none;margin:0;white-space:pre-wrap">VARGHESE</h2>
  </div>

  <script>
    // Starting time: 01:04:33 = 3873 seconds
    let totalSeconds = 3873;

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return pad(h) + ':' + pad(m) + ':' + pad(sec);
    }

    const timerEl = document.getElementById('timer');
    const overlay = document.getElementById('white-overlay');

    const interval = setInterval(() => {
      totalSeconds--;
      if (totalSeconds <= 0) {
        totalSeconds = 0;
        timerEl.textContent = '00:00:00';
        clearInterval(interval);

        // Trigger the white overlay fade-in
        overlay.classList.add('visible');
      } else {
        timerEl.textContent = formatTime(totalSeconds);
      }
    }, 1000);
  </script>
</body>
</html>
