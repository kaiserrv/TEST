<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLIDE RADIO 1.11</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #161616;
      --surface2: #1e1e1e;
      --surface3: #252525;
      --border:   #2a2a2a;
      --border2:  #333;
      --text:     #e8e8e8;
      --muted:    #777;
      --muted2:   #555;
      --white:    #ffffff;
      --header-h: 56px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══ HEADER ══ */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 200;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      text-decoration: none;
      user-select: none;
    }
    .logo-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--white);
    }
    .logo-ver {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      margin-left: 8px;
      padding: 2px 6px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      text-transform: uppercase;
    }

    /* ══ PAGE BODY ══ */
    .page-body {
      margin-top: var(--header-h);
      display: flex;
      gap: 0;
      padding: 20px 24px;
      max-width: 1680px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ══ VIDEO COLUMN ══ */
    .video-col {
      flex: 1 1 0;
      min-width: 0;
      padding-right: 20px;
    }

    .player-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* title */
    .video-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white);
      margin-top: 12px;
      line-height: 1.1;
    }

    /* stats + vote row */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 8px 0 10px;
      border-bottom: 1px solid var(--border);
    }
    .meta-left {
      font-size: 13px;
      color: var(--muted);
    }

    /* vote pills */
    .vote-group {
      display: flex;
      align-items: center;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border2);
    }
    .vote-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .13s, color .13s;
      white-space: nowrap;
    }
    .vote-btn svg {
      width: 16px; height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }
    .vote-btn:hover { background: var(--surface3); }

    .vote-divider {
      width: 1px;
      height: 24px;
      background: var(--border2);
      flex-shrink: 0;
    }

    .vote-btn.like-btn.active    { background: var(--white); color: #000; }
    .vote-btn.dislike-btn.active { background: var(--surface3); color: var(--white); }

    @keyframes bump {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.28); }
      100% { transform: scale(1); }
    }
    .bump { animation: bump .22s ease; }

    /* channel row */
    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .avatar-wrap {
      position: relative;
      width: 40px; height: 40px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .avatar-fallback {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface3);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 900;
      color: var(--white);
      user-select: none;
      letter-spacing: .5px;
    }
    .avatar-img {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border2);
      display: none;
    }
    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      opacity: 0;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      pointer-events: none;
    }
    .avatar-wrap:hover .avatar-overlay { opacity: 1; }
    #avatar-input { display: none; }

    .channel-info { flex: 1; min-width: 0; }
    .channel-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
    }
    .channel-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ══ CHAT COLUMN ══ */
    .chat-col {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .chat-header-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--white);
      flex-shrink: 0;
      animation: livePulse 1.4s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }

    /* chat frame — exactly 500px tall */
    .chat-frame-wrap {
      width: 100%;
      height: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .minnit-chat-sembed        { display: block !important; }
    .minnit-chat-sembed iframe {
      width:  380px !important;
      height: 500px !important;
      border: none   !important;
      display: block !important;
    }
    .powered-by-minnit { display: none !important; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1060px) {
      .page-body { flex-direction: column; padding: 14px 16px; }
      .video-col { padding-right: 0; }
      .chat-col  { width: 100%; margin-top: 16px; }
      .minnit-chat-sembed iframe { width: 100% !important; }
    }
    @media (max-width: 600px) {
      .logo-main   { font-size: 18px; }
      .video-title { font-size: 16px; }
    }

    /* ══ DESCRIPTION ══ */
    .description-box {
      margin-top: 12px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px 14px;
      cursor: pointer;
      overflow: hidden;
      transition: background .13s;
    }
    .description-box:hover { background: var(--surface3); }

    .desc-pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre;
      overflow-x: auto;
      text-align: center;
    }

    .desc-insta {
      display: block;
      margin-top: 10px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .desc-insta a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    .desc-insta a:hover { text-decoration: underline; }

    .desc-collapsed .desc-pre { max-height: 72px; }
    .desc-expanded  .desc-pre { max-height: none; }

    .desc-toggle {
      display: block;
      margin-top: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="#">
      <span class="logo-main">SLIDE RADIO</span>
      <span class="logo-ver">1.11</span>
    </a>
  </header>

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- VIDEO COLUMN -->
    <div class="video-col">

      <div class="player-wrap">
        <iframe
          src="https://www.youtube.com/embed/zo-txPTmkAc?autoplay=1&loop=1&playlist=zo-txPTmkAc&rel=0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          title="SLIDE RADIO 1.11">
        </iframe>
      </div>

      <div class="video-title">SLIDE RADIO 1.11</div>

      <div class="meta-row">
        <div class="meta-left">Live Stream</div>
        <div class="vote-group">
          <button class="vote-btn like-btn" id="like-btn" aria-label="Like">
            <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
            <span id="like-count">—</span>
          </button>
          <div class="vote-divider"></div>
          <button class="vote-btn dislike-btn" id="dislike-btn" aria-label="Dislike">
            <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
            <span id="dislike-count">—</span>
          </button>
        </div>
      </div>

      <div class="channel-row">
        <div class="avatar-wrap" id="avatar-wrap" title="Click to change photo">
          <div class="avatar-fallback" id="avatar-fallback">DW</div>
          <img class="avatar-img" id="avatar-img" src="" alt="djwillyg"/>
          <div class="avatar-overlay">CHANGE<br>PHOTO</div>
          <input type="file" id="avatar-input" accept="image/*">
        </div>
        <div class="channel-info">
          <div class="channel-name">djwillyg</div>
          <div class="channel-sub">Live Stream</div>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="description-box desc-collapsed" id="desc-box" onclick="toggleDesc()">
        <pre class="desc-pre">.&#xB7;&#xB4;&#xAF;`&#xB7;.  &#xB7;&#xB4;&#xAF;&#xB7;.
    |
    | |  ╲  ╲ ╲
    |ロ|   ╲╲       /~/\
    |ロ|      ╲ ╲(  •ω• )
    |ロ|          ╲⊃      つ
    |ロ|               ╲ ╲⊃⊃╲
    |ロ|             ╲|  ╲|__</pre>
        <span class="desc-insta"> <a href="https://instagram.com/sw1117ag" target="_blank" rel="noopener">@sw1117ag</a> on insta</span>
        <span class="desc-toggle" id="desc-toggle">...more</span>
      </div>

    </div>

    <!-- CHAT COLUMN -->
    <div class="chat-col">

      <div class="chat-header">
        <span class="live-dot"></span>
        <span class="chat-header-label">Live Chat</span>
      </div>

      <div class="chat-frame-wrap">
        <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
        <span style="display:none;" class="minnit-chat-sembed"
          data-chatname="https://organizations.minnit.chat/580756382672482/c/SLIDERADIO111?embed"
          data-style="width:380px; height:500px; max-height:500px;"
          data-version="1.55">Chat</span>
      </div>

    </div>

  </div><!-- /page-body -->

  <script>
    /* ─────────────────────────────────────────
       DESCRIPTION TOGGLE
    ───────────────────────────────────────── */
    function toggleDesc() {
      const box = document.getElementById('desc-box');
      const tog = document.getElementById('desc-toggle');
      const isCollapsed = box.classList.contains('desc-collapsed');
      box.classList.toggle('desc-collapsed', !isCollapsed);
      box.classList.toggle('desc-expanded',   isCollapsed);
      tog.textContent = isCollapsed ? 'Show less' : '...more';
    }

    /* ─────────────────────────────────────────
       PERSISTENT VOTES — shared across visitors
    ───────────────────────────────────────── */
    async function getCount(key) {
      try { const r = await window.storage.get(key, true); return r ? parseInt(r.value, 10) : 0; }
      catch { return 0; }
    }
    async function setCount(key, val) {
      try { await window.storage.set(key, String(val), true); } catch {}
    }

    const VOTE_KEY = 'sr111_uv';
    let userVote = sessionStorage.getItem(VOTE_KEY) || null;
    let likes = 0, dislikes = 0;

    const likeBtn        = document.getElementById('like-btn');
    const dislikeBtn     = document.getElementById('dislike-btn');
    const likeCountEl    = document.getElementById('like-count');
    const dislikeCountEl = document.getElementById('dislike-count');

    function render() {
      likeCountEl.textContent    = likes.toLocaleString();
      dislikeCountEl.textContent = dislikes.toLocaleString();
      likeBtn.classList.toggle('active',    userVote === 'like');
      dislikeBtn.classList.toggle('active', userVote === 'dislike');
    }

    async function init() {
      [likes, dislikes] = await Promise.all([getCount('sr111_l'), getCount('sr111_d')]);
      render();
    }

    function bump(el) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      el.addEventListener('animationend', () => el.classList.remove('bump'), { once: true });
    }

    likeBtn.addEventListener('click', async () => {
      if (userVote === 'like') {
        likes = Math.max(0, likes - 1); userVote = null;
      } else {
        if (userVote === 'dislike') { dislikes = Math.max(0, dislikes - 1); await setCount('sr111_d', dislikes); }
        likes++; userVote = 'like'; bump(likeBtn);
      }
      sessionStorage.setItem(VOTE_KEY, userVote || '');
      await setCount('sr111_l', likes);
      render();
    });

    dislikeBtn.addEventListener('click', async () => {
      if (userVote === 'dislike') {
        dislikes = Math.max(0, dislikes - 1); userVote = null;
      } else {
        if (userVote === 'like') { likes = Math.max(0, likes - 1); await setCount('sr111_l', likes); }
        dislikes++; userVote = 'dislike'; bump(dislikeBtn);
      }
      sessionStorage.setItem(VOTE_KEY, userVote || '');
      await setCount('sr111_d', dislikes);
      render();
    });

    init();

    /* ─────────────────────────────────────────
       AVATAR — upload, persist per browser
    ───────────────────────────────────────── */
    const avatarInput    = document.getElementById('avatar-input');
    const avatarImg      = document.getElementById('avatar-img');
    const avatarFallback = document.getElementById('avatar-fallback');
    const avatarWrap     = document.getElementById('avatar-wrap');
    const AV_KEY         = 'sr111_av';

    const saved = localStorage.getItem(AV_KEY);
    if (saved) {
      avatarImg.src = saved;
      avatarImg.style.display = 'block';
      avatarFallback.style.display = 'none';
    }

    avatarWrap.addEventListener('click', () => avatarInput.click());
    avatarInput.addEventListener('change', () => {
      const file = avatarInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        avatarImg.src = e.target.result;
        avatarImg.style.display = 'block';
        avatarFallback.style.display = 'none';
        try { localStorage.setItem(AV_KEY, e.target.result); } catch {}
      };
      reader.readAsDataURL(file);
    });

    /* ─────────────────────────────────────────
       Strip Minnit watermark after inject
    ───────────────────────────────────────── */
    new MutationObserver(() => {
      document.querySelectorAll('.powered-by-minnit').forEach(el => el.remove());
    }).observe(document.body, { childList: true, subtree: true });
  </script>

</body>
</html>
